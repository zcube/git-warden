"cmd.root.short": "코드 품질 및 기준을 위한 Git 커밋 검사기"
"cmd.root.long": "git 저장소에서 커밋 메시지와 코드 주석 기준을 강제하는 도구입니다.\nlefthook, husky 등 git hook 관리자와 통합됩니다."
"cmd.run.short": "추적된 모든 파일의 정책 준수 여부를 검사합니다"
"cmd.run.long": "git(git ls-files)이 추적하는 모든 파일을 읽어 다음을 검사합니다:\n- 바이너리 파일 감지\n- 파일 인코딩 (UTF-8)\n- 데이터 파일 lint (YAML, JSON/JSON5, XML)\n- .editorconfig 준수\n- 주석 언어 준수\n\n'diff'와 달리, 스테이징 여부와 관계없이 모든 파일을 검사합니다."
"cmd.diff.short": "diff 의 정책 준수를 검사합니다 (CI 용 from..to 비교 지원)"
"cmd.diff.long": "git diff 와 호환되는 인자 형식으로 코드 정책을 검사합니다.\n\n인자 없으면 스테이지된 변경(HEAD ↔ index)을 검사합니다.\n그 외 비교는 git diff 와 동일하게 지정합니다:\n\n  git-warden diff                  # 기본: 스테이지된 변경\n  git-warden diff --staged         # 명시적 스테이지 (== --cached)\n  git-warden diff HEAD             # HEAD ↔ working tree (uncommitted 전체)\n  git-warden diff origin/main      # origin/main ↔ working tree\n  git-warden diff A B              # A ↔ B\n  git-warden diff A..B             # A ↔ B (range 표기)\n  git-warden diff A...B            # merge-base(A,B) ↔ B\n\n검사 항목:\n- 바이너리 파일 정책 (block/allow/lfs)\n- 파일 인코딩 (UTF-8)\n- 데이터 파일 lint (YAML, JSON/JSON5, XML)\n- .editorconfig 준수\n- 주석 언어 준수\n- append-only 경로 / 캐시 디렉터리 등"
"cmd.msg.short": "커밋 메시지 위반 사항을 검사합니다"
"cmd.msg.long": "커밋 메시지 파일을 읽어 다음을 검사합니다:\n  - Co-authored-by: 트레일러 (AI 도구, 설정 가능)\n  - 비표준 유니코드 공백 문자\n  - ASCII와 유사한 모호한 유니코드 문자\n  - 잘못된 UTF-8 바이트 시퀀스\n  - 컨벤셔널 커밋 형식 (활성화 시)\n\n--fix 옵션 사용 시, 자동 수정 가능한 위반 사항(언어 검사 제외)이\n커밋 전에 파일 내에서 수정됩니다."
"cmd.prepare_msg.short": "커밋 메시지 템플릿에 정책 힌트를 추가합니다 (prepare-commit-msg 훅)"
"cmd.prepare_msg.long": "설정 기반 정책 안내를 커밋 메시지 파일 끝에 # 주석 줄로 추가합니다.\ngit 이 커밋 시 # 으로 시작하는 줄을 제거하므로 실제 커밋 메시지에는\n남지 않습니다.\n\nsource 가 message(-m/-F), merge, squash, commit(amend) 이면\n사용자가 이미 메시지를 가진 경우이므로 아무것도 하지 않습니다.\n\nlefthook, husky 등을 통해 git prepare-commit-msg 훅으로 사용하세요:\n  prepare-commit-msg:\n    commands:\n      policy-hint:\n        run: git-warden prepare-msg {1} {2} {3}"
"cmd.prepare_msg.hint_header": "── git-warden 정책 안내 ──"
"cmd.prepare_msg.hint_format": "형식: <type>(<scope>): <설명>"
"cmd.prepare_msg.hint_types": "허용 type: %{Types}"
"cmd.prepare_msg.hint_language": "메시지는 %{Language}로 작성하세요"
"cmd.prepare_msg.hint_coauthor": "AI co-author trailer 는 커밋 전에 제거됩니다"
