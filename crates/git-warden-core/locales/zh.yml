"guide.custom_rules": "请按照各规则消息的要求修改或删除相应的模式。"
"guide.protected_paths": "请将受保护路径的更改从暂存区移除 (git restore --staged <文件>)。如果是有意更改，请调整配置中的 protected_paths.paths 模式。"
