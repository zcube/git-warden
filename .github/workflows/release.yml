name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.1)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gv.outputs.SemVer }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Fetch main branch
        run: git fetch origin +refs/heads/main:refs/heads/main 2>/dev/null || true

      - name: Install gitversion-rs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GV_TAG=$(gh release view --repo zcube/gitversion-rs --json tagName -q .tagName)
          gh release download "$GV_TAG" --repo zcube/gitversion-rs \
            --pattern "gitversion-rs-${GV_TAG}-x86_64-unknown-linux-musl.tar.gz" \
            --dir /tmp/gv
          tar xzf "/tmp/gv/gitversion-rs-${GV_TAG}-x86_64-unknown-linux-musl.tar.gz" -C /tmp/gv
          sudo install -m 0755 /tmp/gv/gitversion-rs /usr/local/bin/gitversion-rs
          gitversion-rs --version

      - name: Compute version
        id: gv
        run: gitversion-rs --output build-server

      - name: Set tag metadata
        id: meta
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install git-cliff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLIFF_TAG=$(gh release view --repo orhun/git-cliff --json tagName -q .tagName)
          gh release download "$CLIFF_TAG" --repo orhun/git-cliff \
            --pattern "git-cliff-*-x86_64-unknown-linux-musl.tar.gz" \
            --dir /tmp/cliff
          tar xzf /tmp/cliff/git-cliff-*-x86_64-unknown-linux-musl.tar.gz -C /tmp/cliff
          find /tmp/cliff -maxdepth 2 -name "git-cliff" -type f \
            -exec sudo install -m 0755 {} /usr/local/bin/git-cliff \;
          git-cliff --version

      - name: Generate changelog
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: git-cliff --tag "$TAG" --output CHANGELOG.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.gv.outputs.SemVer }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "v${VERSION}" --notes-file CHANGELOG.md
          else
            gh release create "$TAG" --title "v${VERSION}" --notes-file CHANGELOG.md
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.release.outputs.tag }}

      - name: Inject version into Cargo.toml
        shell: bash
        env:
          GV_VERSION: ${{ needs.release.outputs.version }}
        run: |
          python3 - "$GV_VERSION" <<'PY'
          import re, sys
          v = sys.argv[1]
          s = open("Cargo.toml", encoding="utf-8").read()
          s = re.sub(r'(?m)^version = "[^"]*"', f'version = "{v}"', s, count=1)
          open("Cargo.toml", "w", encoding="utf-8").write(s)
          print(f"version injected: {v}")
          PY

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: git-warden
          target: ${{ matrix.target }}
          include: README.md,README.en.md,README.ja.md,README.zh.md,LICENSE,.git-warden.schema.json,.git-warden.example.yml
          archive: git-warden_$tag_$target
          token: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update Homebrew tap
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Compute SHA256 for macOS archives
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          gh release download "$TAG" --repo zcube/git-warden \
            --pattern "git-warden_${TAG}_aarch64-apple-darwin.tar.gz" \
            --pattern "git-warden_${TAG}_x86_64-apple-darwin.tar.gz" \
            --dir /tmp/brew
          ARM_SHA=$(sha256sum /tmp/brew/git-warden_${TAG}_aarch64-apple-darwin.tar.gz | awk '{print $1}')
          X86_SHA=$(sha256sum /tmp/brew/git-warden_${TAG}_x86_64-apple-darwin.tar.gz | awk '{print $1}')
          echo "arm_sha=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "x86_sha=${X86_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: zcube/homebrew-git-warden
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          TAG: ${{ needs.release.outputs.tag }}
          VERSION: ${{ needs.release.outputs.version }}
          ARM_SHA: ${{ steps.sha.outputs.arm_sha }}
          X86_SHA: ${{ steps.sha.outputs.x86_sha }}
        run: |
          cat > homebrew-tap/Formula/git-warden.rb <<FORMULA
          class GitWarden < Formula
            desc "CLI tool that automatically checks Git commit messages and source code policies"
            homepage "https://github.com/zcube/git-warden"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/zcube/git-warden/releases/download/${TAG}/git-warden_${TAG}_aarch64-apple-darwin.tar.gz"
                sha256 "${ARM_SHA}"
              end
              on_intel do
                url "https://github.com/zcube/git-warden/releases/download/${TAG}/git-warden_${TAG}_x86_64-apple-darwin.tar.gz"
                sha256 "${X86_SHA}"
              end
            end

            def install
              bin.install "git-warden"
            end

            test do
              system "#{bin}/git-warden", "version"
            end
          end
          FORMULA

      - name: Commit and push formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/git-warden.rb
          git commit -m "bump git-warden to ${VERSION}"
          git push
