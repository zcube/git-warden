"guide.header": "개선 가이드 (AI 에이전트: 아래 지시에 따라 위 위반 사항을 수정하세요):"
"guide.binary": "커밋 대상이 아니면 'git rm --cached <파일>' 로 스테이징에서 제거하고 .gitignore에 추가하세요. 의도된 바이너리라면 'git lfs track <패턴>' 으로 LFS 추적하거나 설정의 binary_file 정책을 조정하세요."
"guide.encoding": "파일을 UTF-8로 변환한 뒤 다시 스테이징하세요. 예: iconv -f <현재인코딩> -t UTF-8 <파일> > tmp && mv tmp <파일>"
"guide.unicode": "보고된 위치의 보이지 않는 문자와 ASCII 혼동 문자를 의도한 표준 ASCII 문자로 교체하세요."
"guide.lint": "보고된 파일:라인의 구문 오류를 수정하세요. 주석이 필요한 JSON 파일은 .jsonc 확장자 사용 또는 lint.json.comment_filter: true 설정을 고려하세요."
"guide.editorconfig": ".editorconfig 규칙(들여쓰기, 줄 끝 공백, 마지막 개행)에 맞게 보고된 파일을 수정하세요."
"guide.comment_language": "나열된 파일:라인의 주석·문자열을 요구된 언어로 번역하세요. 코드 식별자, 기술 용어, URL은 원문을 유지하세요. 번역하면 안 되는 고유명사는 설정의 allowed_words에 추가하세요."
"guide.cache_dir": "'git-warden clean' 으로 캐시·빌드 산출물을 정리하고 해당 디렉터리를 .gitignore에 추가하세요."
"guide.custom_rules": "각 규칙 메시지가 요구하는 대로 해당 패턴을 수정하거나 제거하세요."
"guide.protected_paths": "보호된 경로의 변경을 스테이징에서 제거하세요 (git restore --staged <파일>). 의도된 변경이라면 설정의 protected_paths.paths 패턴을 조정하세요."
"guide.append_only": "append-only 경로의 기존 내용 변경을 되돌리세요. 새 내용은 파일 끝에 추가하거나, 기존 파일들보다 뒤에 정렬되는 이름의 새 파일로 추가하세요."
"guide.commit_message": "커밋 메시지를 정책에 맞게 다시 작성하세요. AI co-author trailer와 보이지 않는 문자는 'git-warden msg --fix <메시지파일>' 로 자동 제거할 수 있습니다."
"validate.schema_violation": "%{Path}: 스키마 위반: %{Message}%{Location}"
