"cmd.push.short": "푸쉬될 커밋의 메시지를 검사합니다"
"cmd.push.long": "git pre-push 훅 형식의 stdin을 읽어 각 커밋 메시지를\n설정된 정책에 따라 검사합니다.\n\nlefthook, husky 등을 통해 git pre-push 훅으로 사용하세요:\n  pre-push:\n    commands:\n      check-commits:\n        run: git-warden push\n\n또는 특정 범위를 직접 지정할 수 있습니다:\n  git-warden push --range origin/main..HEAD"
