"cmd.root.short": "Git commit checker for code quality and standards"
"cmd.root.long": "A tool to enforce commit message and code comment standards in git repositories.\nIntegrates with lefthook, husky, and other git hook managers."
"cmd.run.short": "Check all tracked files for policy compliance"
"cmd.run.long": "Reads all files tracked by git (git ls-files) and checks:\n- binary file detection\n- file encoding (UTF-8)\n- data file lint (YAML, JSON/JSON5, XML)\n- .editorconfig compliance\n- comment language compliance\n\nUnlike 'diff', this command checks all files regardless of staged state."
"cmd.diff.short": "Check a diff for policy compliance (CI-friendly from..to)"
"cmd.diff.long": "Check policy on a diff. Argument format mirrors `git diff`.\n\nWithout arguments, checks staged changes (HEAD ↔ index). For other\ncomparisons, use the same syntax as `git diff`:\n\n  git-warden diff                  # default: staged\n  git-warden diff --staged         # explicit (alias: --cached)\n  git-warden diff HEAD             # HEAD ↔ working tree\n  git-warden diff origin/main      # origin/main ↔ working tree\n  git-warden diff A B              # A ↔ B\n  git-warden diff A..B             # A ↔ B (range)\n  git-warden diff A...B            # merge-base(A,B) ↔ B\n\nChecks:\n- binary file policy (block/allow/lfs)\n- file encoding (UTF-8)\n- data file lint (YAML, JSON/JSON5, XML)\n- .editorconfig compliance\n- comment language compliance\n- append-only paths / cache directories, etc."
"cmd.msg.short": "Check commit message for violations"
"cmd.msg.long": "Reads the commit message file and checks for:\n  - Co-authored-by: trailers (AI tools, configurable)\n  - Invisible / non-standard Unicode space characters\n  - Ambiguous Unicode characters that look like ASCII\n  - Invalid UTF-8 byte sequences\n  - Conventional commit format (when enabled)\n\nWith --fix, auto-fixable violations (all except language checks) are\ncorrected in place before the commit proceeds."
"cmd.prepare_msg.short": "Add policy hints to the commit message template (prepare-commit-msg hook)"
"cmd.prepare_msg.long": "Appends config-based policy hints to the end of the commit message file\nas # comment lines. Git strips lines starting with # at commit time,\nso the hints never end up in the actual commit message.\n\nDoes nothing when source is message (-m/-F), merge, squash, or\ncommit (amend) — the user already has a message in those cases.\n\nUse as a git prepare-commit-msg hook via lefthook, husky, or similar:\n  prepare-commit-msg:\n    commands:\n      policy-hint:\n        run: git-warden prepare-msg {1} {2} {3}"
"cmd.prepare_msg.hint_header": "── git-warden policy guide ──"
"cmd.prepare_msg.hint_format": "Format: <type>(<scope>): <description>"
"cmd.prepare_msg.hint_types": "Allowed types: %{Types}"
"cmd.prepare_msg.hint_language": "Write the commit message in %{Language}"
"cmd.prepare_msg.hint_coauthor": "AI co-author trailers will be removed before commit"
"lang.korean": "Korean"
"lang.english": "English"
"lang.japanese": "Japanese"
"lang.chinese": "Chinese"
"cmd.fix.short": "Auto-fix Unicode issues in staged files"
"cmd.fix.long": "Scans staged files for auto-fixable Unicode issues and corrects them in place.\n\nAuto-fixable issues:\n  - Invisible / non-standard Unicode space characters (replaced or removed)\n  - Ambiguous Unicode characters that look like ASCII (replaced with ASCII)\n  - Invalid UTF-8 byte sequences (removed)\n\nFixed files are automatically re-staged with git add.\n\nExamples:\n  git-warden fix             # fix staged files\n  git-warden fix --dry-run   # preview fixes without writing changes"
"cmd.clean.short": "Clean untracked files inside build artifact / cache directories"
"cmd.clean.long": "Scan the current git repository for build artifact / cache directories\n(node_modules, dist, build, target, __pycache__, .venv, etc.).\n\nDetection uses parent-dir indicators (go.mod, package.json, Cargo.toml, …)\nso false positives are minimised.\n\nTracked files are never deleted — only files reported by\n`git ls-files --others` are eligible.\n\nExamples:\n  git-warden clean              # list found dirs (dry-run)\n  git-warden clean --yes        # actually delete untracked files"
"cmd.clean.scanning": "Scanning: %{Path}"
"cmd.clean.no_cache_dirs": "No cache / build directories found."
"cmd.clean.found_header": "Found %{Count} cache / build directories (total %{Size}):"
"cmd.clean.entry": "  %{Path}  (%{Size}%{Tracked})"
"cmd.clean.entry_tracked": ", %{Count} tracked files ⚠"
"cmd.clean.dry_run_hint": "\nUse --yes to delete untracked files."
"cmd.clean.cleaned_summary": "Cleaned %{Size} (%{Count} dirs)"
"cmd.clean.not_in_repo": "not a git repository: %{Path}"
"cmd.push.short": "Check commit messages for commits about to be pushed"
"cmd.push.long": "Reads commit information from stdin (git pre-push hook format) and checks\neach commit message against configured policies.\n\nUse as a git pre-push hook via lefthook, husky, or similar tools:\n  pre-push:\n    commands:\n      check-commits:\n        run: git-warden push\n\nOr check a specific range manually:\n  git-warden push --range origin/main..HEAD"
"cmd.validate.short": "Validate the configuration file"
"cmd.validate.long": "Check the configuration file for errors and potential issues."
"cmd.init.short": "Generate default configuration file"
"cmd.init.long": "Generate a default .git-warden.yaml configuration file in the current directory.\n\n.git-warden.yml is also supported for compatibility.\n\nUse --lang to set the locale (ko, en, ja, zh). If not specified, the system locale is detected automatically.\nUse --force to overwrite an existing file."
"cmd.migrate.short": "Migrate config file to the latest schema"
"cmd.migrate.long": "Detect the schema version of the config file and migrate it to the latest format.\n\nOld field names are automatically renamed and deprecated fields are removed.\nComments and formatting are preserved during migration.\n\nUse --dry-run to preview changes without modifying the file."
"cmd.analyze.short": "Analyze repository and detect languages and lint configurations"
"cmd.analyze.long": "Scans the current repository to detect programming languages used,\nchecks for existing lint configurations, and reports recommendations."
"cmd.version.short": "Print version information"
