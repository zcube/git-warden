"cmd.fix.short": "스테이지된 파일의 유니코드 이슈를 자동 수정합니다"
"cmd.fix.long": "스테이지된 파일에서 자동 수정 가능한 유니코드 이슈를 수정합니다.\n\n자동 수정 가능한 이슈:\n  - 비표준 유니코드 공백 문자 (교체 또는 제거)\n  - ASCII와 유사한 모호한 유니코드 문자 (ASCII로 교체)\n  - 잘못된 UTF-8 바이트 시퀀스 (제거)\n\n수정된 파일은 자동으로 다시 스테이지됩니다.\n\n예시:\n  git-warden fix             # 스테이지된 파일 수정\n  git-warden fix --dry-run   # 변경하지 않고 수정 내용 미리 보기"
"cmd.clean.short": "빌드 산출물·캐시 디렉터리에서 미추적 파일을 정리합니다"
"cmd.clean.long": "현재 git 저장소를 스캔하여 빌드 산출물·캐시 디렉터리(node_modules, dist,\nbuild, target, __pycache__, .venv 등)를 찾습니다.\n\n부모 디렉터리 인디케이터(go.mod, package.json, Cargo.toml 등) 기반으로\n실제 캐시 디렉터리만 식별하므로 false positive 가 적습니다.\n\ngit 추적 중인 파일은 절대 삭제하지 않습니다 — `git ls-files --others` 로\n미추적 파일만 대상으로 삼습니다.\n\n예시:\n  git-warden clean              # 발견 항목 출력 (dry-run)\n  git-warden clean --yes        # 미추적 파일 실제 삭제"
