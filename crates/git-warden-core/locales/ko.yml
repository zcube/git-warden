"cmd.init.short": "기본 설정 파일을 생성합니다"
"cmd.init.long": "현재 디렉터리에 기본 .git-warden.yaml 설정 파일을 생성합니다.\n\n.git-warden.yml 도 호환용으로 지원합니다.\n\n--lang으로 로케일을 설정할 수 있습니다 (ko, en, ja, zh). 지정하지 않으면 시스템 로케일이 자동으로 감지됩니다.\n--force를 사용하면 기존 파일을 덮어씁니다."
"cmd.migrate.short": "설정 파일을 최신 스키마로 마이그레이션합니다"
"cmd.migrate.long": "설정 파일의 스키마 버전을 감지하고 최신 형식으로 마이그레이션합니다.\n\n이전 필드 이름이 자동으로 이름 변경되고 더 이상 사용되지 않는 필드가 제거됩니다.\n마이그레이션 중에 주석과 형식이 유지됩니다.\n\n--dry-run을 사용하면 파일을 수정하지 않고 변경 사항을 미리 볼 수 있습니다."
