"cmd.root.short": "コード品質と標準のためのGitコミットチェッカー"
"cmd.root.long": "gitリポジトリでコミットメッセージとコードコメントの基準を強制するツールです。\nlefthook、huskyなどのgitフック管理ツールと統合されます。"
"cmd.run.short": "追跡されたすべてのファイルのポリシー準拠をチェックします"
"cmd.run.long": "git(git ls-files)が追跡するすべてのファイルを読み込み、以下を検査します:\n- バイナリファイル検出\n- ファイルエンコーディング (UTF-8)\n- データファイルlint (YAML, JSON/JSON5, XML)\n- .editorconfig準拠\n- コメント言語準拠\n\n'diff'と異なり、ステージング状態に関わらずすべてのファイルをチェックします。"
"cmd.diff.short": "差分のポリシー準拠をチェックします (CI 用の from..to 比較対応)"
"cmd.diff.long": "git diff と互換の引数形式でコードポリシーをチェックします。\n\n引数なしならステージされた変更 (HEAD ↔ index) を検査します。\nその他の比較は git diff と同じ方法で指定します:\n\n  git-warden diff                  # 既定: ステージされた変更\n  git-warden diff --staged         # 明示的ステージ (--cached も同じ)\n  git-warden diff HEAD             # HEAD ↔ working tree\n  git-warden diff origin/main      # origin/main ↔ working tree\n  git-warden diff A B              # A ↔ B\n  git-warden diff A..B             # A ↔ B (range 表記)\n  git-warden diff A...B            # merge-base(A,B) ↔ B\n\n検査項目:\n- バイナリファイルポリシー (block/allow/lfs)\n- ファイルエンコーディング (UTF-8)\n- データファイル lint\n- .editorconfig 準拠\n- コメント言語準拠\n- append-only パス / キャッシュディレクトリ等"
"cmd.msg.short": "コミットメッセージの違反をチェックします"
"cmd.msg.long": "コミットメッセージファイルを読み込み、以下を検査します:\n  - Co-authored-by: トレーラー (AIツール、設定可能)\n  - 不可視/非標準Unicodeスペース文字\n  - ASCIIに似た紛らわしいUnicode文字\n  - 不正なUTF-8バイトシーケンス\n  - Conventional commitフォーマット (有効時)\n\n--fixを使用すると、自動修正可能な違反(言語チェック以外)が\nコミット前にファイル内で修正されます。"
"cmd.prepare_msg.short": "コミットメッセージテンプレートにポリシーヒントを追加します (prepare-commit-msg フック)"
"cmd.prepare_msg.long": "設定に基づくポリシー案内をコミットメッセージファイルの末尾に\n# コメント行として追加します。git はコミット時に # で始まる行を\n削除するため、実際のコミットメッセージには残りません。\n\nsource が message(-m/-F)、merge、squash、commit(amend) の場合、\nユーザーが既にメッセージを持っているため何もしません。\n\nlefthook、husky などを通じて git prepare-commit-msg フックとして使用してください:\n  prepare-commit-msg:\n    commands:\n      policy-hint:\n        run: git-warden prepare-msg {1} {2} {3}"
"cmd.prepare_msg.hint_header": "── git-warden ポリシー案内 ──"
"cmd.prepare_msg.hint_format": "フォーマット: <type>(<scope>): <説明>"
"cmd.prepare_msg.hint_types": "許可された type: %{Types}"
"cmd.prepare_msg.hint_language": "コミットメッセージは%{Language}で書いてください"
"cmd.prepare_msg.hint_coauthor": "AI co-author トレーラーはコミット前に削除されます"
"lang.korean": "韓国語"
"lang.english": "英語"
"lang.japanese": "日本語"
"lang.chinese": "中国語"
"cmd.fix.short": "ステージ済みファイルのUnicode問題を自動修正します"
"cmd.fix.long": "ステージ済みファイルの自動修正可能なUnicode問題をスキャンして修正します。\n\n自動修正可能な問題:\n  - 不可視/非標準Unicodeスペース文字 (置換または削除)\n  - ASCIIに似た紛らわしいUnicode文字 (ASCIIに置換)\n  - 不正なUTF-8バイトシーケンス (削除)\n\n修正されたファイルは自動的に再ステージされます。\n\n例:\n  git-warden fix             # ステージ済みファイルを修正\n  git-warden fix --dry-run   # 変更を保存せずにプレビュー"
"cmd.clean.short": "ビルド成果物・キャッシュディレクトリの未追跡ファイルを整理します"
"cmd.clean.long": "現在の git リポジトリをスキャンしてビルド成果物・キャッシュディレクトリ\n(node_modules, dist, build, target, __pycache__, .venv 等)を検出します。\n\n親ディレクトリのインジケータ(go.mod, package.json, Cargo.toml 等)を\n基準に検証するため誤検出が少ないです。\n\ngit 追跡中のファイルは絶対に削除しません — `git ls-files --others` で\n未追跡のファイルのみを対象とします。\n\n例:\n  git-warden clean              # 検出のみ表示 (dry-run)\n  git-warden clean --yes        # 未追跡ファイルを実際に削除"
"cmd.clean.scanning": "スキャン中: %{Path}"
"cmd.clean.no_cache_dirs": "キャッシュ・ビルドディレクトリは見つかりませんでした。"
"cmd.clean.found_header": "%{Count} 件のキャッシュ・ビルドディレクトリを発見 (合計 %{Size}):"
"cmd.clean.entry": "  %{Path}  (%{Size}%{Tracked})"
"cmd.clean.entry_tracked": ", git 追跡ファイル %{Count} 件 ⚠"
"cmd.clean.dry_run_hint": "\n--yes フラグで未追跡ファイルを削除できます。"
"cmd.clean.cleaned_summary": "%{Size} を整理しました (%{Count} ディレクトリ)"
"cmd.clean.not_in_repo": "git リポジトリではありません: %{Path}"
"cmd.push.short": "プッシュされるコミットのメッセージを検査します"
"cmd.push.long": "git pre-pushフック形式のstdinを読み込み、各コミットメッセージを\n設定されたポリシーに従って検査します。\n\nlefthook、huskyなどでgit pre-pushフックとして使用してください:\n  pre-push:\n    commands:\n      check-commits:\n        run: git-warden push\n\nまたは特定の範囲を直接指定できます:\n  git-warden push --range origin/main..HEAD"
"cmd.validate.short": "設定ファイルを検証します"
"cmd.validate.long": "設定ファイルのエラーと潜在的な問題を確認します。"
"cmd.init.short": "デフォルト設定ファイルを生成します"
"cmd.init.long": "現在のディレクトリにデフォルトの.git-warden.yaml設定ファイルを生成します。\n\n.git-warden.yml も互換用に対応しています。\n\n--langでロケールを設定できます (ko, en, ja, zh)。指定しない場合、システムロケールが自動的に検出されます。\n--forceで既存のファイルを上書きできます。"
"cmd.migrate.short": "設定ファイルを最新スキーマに移行します"
"cmd.migrate.long": "設定ファイルのスキーマバージョンを検出し、最新フォーマットに移行します。\n\n古いフィールド名は自動的に変更され、廃止されたフィールドは削除されます。\n移行中にコメントとフォーマットが保持されます。\n\n--dry-runでファイルを変更せずに変更内容をプレビューできます。"
