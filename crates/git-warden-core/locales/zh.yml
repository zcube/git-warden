"cmd.root.short": "用于代码质量和规范的Git提交检查器"
"cmd.root.long": "用于在git仓库中强制执行提交消息和代码注释标准的工具。\n与lefthook、husky等git钩子管理器集成。"
"cmd.run.short": "检查所有跟踪文件的策略合规性"
"cmd.run.long": "读取git(git ls-files)跟踪的所有文件并检查:\n- 二进制文件检测\n- 文件编码 (UTF-8)\n- 数据文件lint (YAML, JSON/JSON5, XML)\n- .editorconfig合规性\n- 注释语言合规性\n\n与'diff'不同，此命令检查所有文件，无论是否已暂存。"
"cmd.diff.short": "检查 diff 的策略合规性 (支持 CI 用 from..to 比较)"
"cmd.diff.long": "使用与 git diff 兼容的参数格式检查代码策略。\n\n无参数时检查暂存的更改 (HEAD ↔ index)。其他比较使用与 git diff\n相同的语法:\n\n  git-warden diff                  # 默认: 暂存\n  git-warden diff --staged         # 显式暂存 (--cached 同义)\n  git-warden diff HEAD             # HEAD ↔ working tree\n  git-warden diff origin/main      # origin/main ↔ working tree\n  git-warden diff A B              # A ↔ B\n  git-warden diff A..B             # A ↔ B (range 表示)\n  git-warden diff A...B            # merge-base(A,B) ↔ B\n\n检查项:\n- 二进制文件策略 (block/allow/lfs)\n- 文件编码 (UTF-8)\n- 数据文件 lint\n- .editorconfig 合规性\n- 注释语言合规性\n- append-only 路径 / 缓存目录等"
"cmd.msg.short": "检查提交消息是否存在违规"
"cmd.msg.long": "读取提交消息文件并检查:\n  - Co-authored-by: 尾部标记 (AI工具，可配置)\n  - 不可见/非标准Unicode空格字符\n  - 看起来像ASCII的模糊Unicode字符\n  - 无效的UTF-8字节序列\n  - 约定式提交格式 (启用时)\n\n使用--fix时，可自动修复的违规(除语言检查外)将在提交前就地修正。"
"cmd.prepare_msg.short": "向提交消息模板添加策略提示 (prepare-commit-msg 钩子)"
"cmd.prepare_msg.long": "将基于配置的策略提示以 # 注释行的形式追加到提交消息文件末尾。\ngit 在提交时会删除以 # 开头的行，因此提示不会出现在实际的提交消息中。\n\n当 source 为 message(-m/-F)、merge、squash 或 commit(amend) 时，\n用户已经有消息，因此不做任何操作。\n\n通过 lefthook、husky 等作为 git prepare-commit-msg 钩子使用:\n  prepare-commit-msg:\n    commands:\n      policy-hint:\n        run: git-warden prepare-msg {1} {2} {3}"
"cmd.prepare_msg.hint_header": "── git-warden 策略指南 ──"
"cmd.prepare_msg.hint_format": "格式: <type>(<scope>): <描述>"
"cmd.prepare_msg.hint_types": "允许的 type: %{Types}"
"cmd.prepare_msg.hint_language": "提交消息请使用%{Language}编写"
"cmd.prepare_msg.hint_coauthor": "AI co-author 尾部标记将在提交前被删除"
"lang.korean": "韩语"
"lang.english": "英语"
"lang.japanese": "日语"
"lang.chinese": "中文"
"cmd.fix.short": "自动修复已暂存文件中的Unicode问题"
"cmd.fix.long": "扫描已暂存文件中可自动修复的Unicode问题并就地修正。\n\n可自动修复的问题:\n  - 不可见/非标准Unicode空格字符 (替换或删除)\n  - 看起来像ASCII的模糊Unicode字符 (替换为ASCII)\n  - 无效的UTF-8字节序列 (删除)\n\n修复的文件将自动重新暂存。\n\n示例:\n  git-warden fix             # 修复已暂存文件\n  git-warden fix --dry-run   # 预览修复内容而不保存更改"
"cmd.clean.short": "清理构建产物·缓存目录中的未追踪文件"
"cmd.clean.long": "扫描当前 git 仓库以查找构建产物·缓存目录\n(node_modules, dist, build, target, __pycache__, .venv 等)。\n\n通过父目录指示器(go.mod, package.json, Cargo.toml 等)进行验证，\n误报较少。\n\ngit 追踪的文件绝不会被删除 — 仅删除 `git ls-files --others`\n报告的未追踪文件。\n\n示例:\n  git-warden clean              # 仅显示发现项 (dry-run)\n  git-warden clean --yes        # 实际删除未追踪文件"
"cmd.clean.scanning": "扫描中: %{Path}"
"cmd.clean.no_cache_dirs": "未发现缓存·构建目录。"
"cmd.clean.found_header": "发现 %{Count} 个缓存·构建目录 (总计 %{Size}):"
"cmd.clean.entry": "  %{Path}  (%{Size}%{Tracked})"
"cmd.clean.entry_tracked": ", git 追踪文件 %{Count} 个 ⚠"
"cmd.clean.dry_run_hint": "\n使用 --yes 标志可删除未追踪文件。"
"cmd.clean.cleaned_summary": "已清理 %{Size} (%{Count} 个目录)"
"cmd.clean.not_in_repo": "不是 git 仓库: %{Path}"
"cmd.push.short": "检查即将推送的提交消息"
"cmd.push.long": "读取git pre-push钩子格式的stdin，并根据配置策略检查每个提交消息。\n\n通过lefthook、husky等工具作为git pre-push钩子使用:\n  pre-push:\n    commands:\n      check-commits:\n        run: git-warden push\n\n或直接指定特定范围:\n  git-warden push --range origin/main..HEAD"
"cmd.validate.short": "验证配置文件"
"cmd.validate.long": "检查配置文件是否存在错误和潜在问题。"
"cmd.init.short": "生成默认配置文件"
"cmd.init.long": "在当前目录生成默认的.git-warden.yaml配置文件。\n\n也支持 .git-warden.yml 作为兼容格式。\n\n使用--lang设置语言环境 (ko, en, ja, zh)。如果未指定，系统语言环境将自动检测。\n使用--force覆盖现有文件。"
"cmd.migrate.short": "将配置文件迁移到最新架构"
"cmd.migrate.long": "检测配置文件的架构版本并迁移到最新格式。\n\n旧字段名称会自动重命名，已弃用的字段会被删除。\n迁移过程中保留注释和格式。\n\n使用--dry-run可以在不修改文件的情况下预览更改。"
"cmd.analyze.short": "分析仓库并检测语言和Lint配置"
"cmd.analyze.long": "扫描当前仓库以检测使用的编程语言，\n检查现有lint配置，并报告建议。"
