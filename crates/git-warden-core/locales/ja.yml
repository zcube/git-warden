"guide.header": "改善ガイド (AIエージェント: 以下の指示に従って上記の違反を修正してください):"
"guide.binary": "コミット対象でない場合は 'git rm --cached <ファイル>' でステージングから除外し、.gitignore に追加してください。意図したバイナリの場合は 'git lfs track <パターン>' で LFS 追跡するか、設定の binary_file ポリシーを調整してください。"
"guide.encoding": "ファイルを UTF-8 に変換してから再ステージングしてください。例: iconv -f <現在のエンコーディング> -t UTF-8 <ファイル> > tmp && mv tmp <ファイル>"
"guide.unicode": "報告された位置の不可視文字と ASCII に似た紛らわしい文字を、意図した標準 ASCII 文字に置き換えてください。"
"guide.lint": "報告されたファイル:行の構文エラーを修正してください。コメントが必要な JSON ファイルには、.jsonc 拡張子の使用または lint.json.comment_filter: true の設定を検討してください。"
"guide.editorconfig": ".editorconfig のルール（インデント、行末空白、末尾の改行）に合わせて報告されたファイルを修正してください。"
"guide.comment_language": "列挙されたファイル:行のコメント・文字列を要求された言語に翻訳してください。コード識別子、技術用語、URL は原文のままにしてください。翻訳してはいけない固有名詞は設定の allowed_words に追加してください。"
"guide.cache_dir": "'git-warden clean' でキャッシュ・ビルド成果物を整理し、該当ディレクトリを .gitignore に追加してください。"
"guide.custom_rules": "各ルールのメッセージが要求するとおりに、該当パターンを修正または削除してください。"
"guide.protected_paths": "保護されたパスへの変更をステージングから取り除いてください (git restore --staged <ファイル>)。意図した変更であれば、設定の protected_paths.paths パターンを調整してください。"
"guide.append_only": "append-only パスの既存内容への変更を元に戻してください。新しい内容はファイル末尾に追加するか、既存ファイルより後にソートされる名前の新規ファイルとして追加してください。"
"guide.commit_message": "コミットメッセージをポリシーに合わせて書き直してください。AI co-author トレーラーと不可視文字は 'git-warden msg --fix <メッセージファイル>' で自動削除できます。"
