"guide.header": "改进指南（AI 代理：请按照以下说明修复上述违规项）："
"guide.binary": "如果文件不应被提交，请使用 'git rm --cached <文件>' 将其从暂存区移除并添加到 .gitignore。如果是有意提交的二进制文件，请使用 'git lfs track <模式>' 进行 LFS 跟踪，或调整配置中的 binary_file 策略。"
"guide.encoding": "将文件转换为 UTF-8 后重新暂存。例如: iconv -f <当前编码> -t UTF-8 <文件> > tmp && mv tmp <文件>"
"guide.unicode": "将报告位置中的不可见字符和与 ASCII 易混淆的字符替换为预期的标准 ASCII 字符。"
"guide.lint": "修复报告的文件:行中的语法错误。需要注释的 JSON 文件请考虑使用 .jsonc 扩展名或设置 lint.json.comment_filter: true。"
"guide.editorconfig": "请根据 .editorconfig 规则（缩进、行尾空格、文件末尾换行）修改报告的文件。"
"guide.comment_language": "将列出的文件:行中的注释和字符串翻译为要求的语言。代码标识符、技术术语和 URL 保持原文。不应翻译的专有名词请添加到配置的 allowed_words 中。"
